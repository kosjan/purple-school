<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Form</title>
</head>

<body>
    <main>
        <h1>Свяжитесь <br> со мной</h1>
        <form action="#">
            <div class="field">
                <img src="./images/message.svg" alt="messag pic">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Email" required>
            </div>
            <div class="field">
                <img src="./images/telegram.svg" alt="telegram pic">
                <label for="telegram">Telegram</label>
                <input type="text" name="telegram" id="telegram" placeholder="Telegram">
            </div>
            <div class="field">
                <img src="./images/topic.svg" alt="topic pic">
                <label for="theme">Тема</label>
                <select name="theme" id="theme" required>
                    <option value="1">Приобретение курсов</option>
                    <option value="2">Обратная связь</option>
                </select>
            </div>
            <div class="field">
                <label for="comment">Комментарий</label>
                <textarea name="comment" id="comment"></textarea>
            </div>
            <button type="submit">Отправить</button>
        </form>
    </main>
</body>

</html>
